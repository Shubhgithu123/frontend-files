<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }
        .container{
            width: 100vw;
            height: 100vh;
            background-color: #8BC6EC;
            background-image: linear-gradient(135deg, #8BC6EC 0%, #9599E2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            width: 400px;
            height: 600px;
            background-color: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }
        .card img{
            width: 100%;
            height: 30%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            
        }
        .textbox{
            width: 80%;
            /* height: 300%; */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 15px;
            text-align: center;
            /* line-height: 25px; */

        }
        
        

        #paymentbtn{
            width: 80%;
            height: 10%;
            background-color:rgb(25, 22, 79);
            border-radius: 10px;
            color: white;
            border-style: none;
            box-shadow: 0px 7px 30px black;
        }
        
        #cancelorder{
            color:rgb(25, 22, 79);
            font-weight: bold;
            font-size: large;
        }
        #cancelorder a{
            text-decoration: none;
        }
        .amountbox{
            width:80%;
            height: 10%;
            background-color:#8BC6EC;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            padding: 20px;

            /* align-items:center ; */
        }
        .leftbox{
            width: 45%;
            display: flex;
            justify-content: space-between;
            align-items: center;

        }
        .leftbox img{
           width: 40px;
           height: 40px;
        }
        .rightbox{
            display: flex;
            align-items:center;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="card">
            <img src="./images/icon.jpg" alt="">
            
          <div class="textbox">
              <h2>Order Summary</h2>
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Ipsum exercitationem, assumenda sit similique dolorem asperiores voluptatibus animi! Nisi, tenetur provident!</p>

          </div>

          <div class="amountbox">
            <div class="leftbox">
                <img src="./images/music.png">
                <div class="txbox">
                    <p>Annual Plan</p>
                    <p>$99.9/year</p>
                </div>
            </div>
            <div class="rightbox">
                <a href="#">Change</a>
            </div>
          </div>

          <button id="paymentbtn">
            Proceed to Payment
          </button>

          <div id="cancelorder">
            <a href="#">Cancel Order</a>
          </div>
          </div>
        </div>
    </div>

</body>
</html>
