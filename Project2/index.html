<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating Cards</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
     <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            background-color: #8BC6EC;
            background-image: linear-gradient(135deg, #8BC6EC 0%, #9599E2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main{
            height: 400px;
            width:300px;
            background-color: white;
            border: 1px solid black;
            /* margin: 10px; */
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
        }

        .upper img{
            height: 280px;
            width: 270px;
            border-radius: 20px;
        }
        .lower{
            width: 80%;
            line-height: 1;
            font-size: 13px;
            text-align:start;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
     </style>
</head>
<body>
    <div class="container">
        <div class="main">
            <div class="upper">
                <img src="./images/qrcode.png" alt="">
            </div>
            <div class="lower">
                <h2>Lorem ipsum dolor, sit amet consectetur adipisicing.</h2>
                <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit.</p>
            </div>
        </div>

    </div>
</body>
</html>
