<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animatiojn ka gyan</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            /* margin: 2px; */
            width: 100vw;
            height: 100vh;
            background-color: beige;
            border: 5px solid black;
        }
        .box{
            width: 350px;
            height: 80px;
            background-color: blue;
            border: 3px solid yellow;
            border-radius: 10px;
            margin: 10px;position: relative;
            /* animation-name: rightMovement; */
            /* animation-duration: 10s;
            animation-iteration-count: infinite; */
            /* animation-delay: 2s; */
            /* animation-timing-function: linear;
            /* animation-timing-function:ease; */
            /* animation-timing-function:ease-in; */
            /* animation-timing-function:ease-in-out; */
            /* animation-timing-function:ease-out; */
            /* animation-timing-function:cubic-bezier(0.175, 0.885, 0.32, 1.275) */
            /* animation-direction: alternate;
            animation-fill-mode: both; */ 
            animation: 10s linear 2s infinite alternate none running rightMovement;

        }

        @keyframes rightMovement {
            from{
                top: 0;
                left: 0;
            }
            to{
                top: 0;
                left:800px
            }
        }

        .box2{
            width: 350px;
            height: 80px;
            background-color: blue;
            border: 3px solid yellow;
            border-radius: 10px;
            margin: 10px;position: relative;
            animation: 10s linear 2s infinite alternate none running leftMovement;
            /* right: ; */
        }
        @keyframes leftMovement {
            from{
                top: 0;
                
                left: 800px;
            }
            to{
                top: 0;
                left:0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">

        </div>
        <div class="box2">

        </div>
    </div>
</body>
</html>
