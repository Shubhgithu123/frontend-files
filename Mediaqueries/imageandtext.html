<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            box-sizing: border-box;
             background-color: beige;
            border: 5px solid black;
            margin: 2px;
            padding: 2px;
            display: flex;
            flex-direction: row;
            height: 800px;
            justify-content: space-around;
            align-items: center;
            /* align-content: center; */
        }
        .box1{
            border: 2px solid black;
            height: 400px;
            width: 400px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
        }
        .text1{
            border: 2px solid brown;
            height: 100px;
            width: 200px;
           display: flex;
           align-items: center;
            justify-content: center;
        }
         .text2{
            border: 2px solid brown;
            height: 100px;
            width: 200px;
           display: flex;
           align-items: center;
            justify-content: center;
        }
        .box2 img{
           height: 400px;
           width: 400px;
        }
        .box2:hover{
            box-shadow: 2px 10px 90px black;
            transition: box-shadow 1s;
        }
        @media (max-width:640px) {
            .main{
                flex-direction: column;
             
            }
            .box1{
                height: 350px;
                width: 350px;
            }     
            .box2 img{
                height: 350px;
                width: 350px;
            }   
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="box1">
            <div  class="text1">Shubham</div>
            <div class="text2">Wangekar</div>
        </div>
        <div class="box2">
            <img src="./images.webp" alt="">
        </div>
    </div>
</body>
</html>
